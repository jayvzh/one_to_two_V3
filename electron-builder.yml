appId: com.onetotwo.app
productName: OneToTwo
copyright: Copyright © 2024 OneToTwo Team

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - node_modules/**/*
  - package.json

extraResources:
  - from: dist/onetotwo-api.exe
    to: onetotwo-api.exe
  - from: one_to_two_V2/config
    to: one_to_two_V2/config
  - from: one_to_two_V2/src/pipeline/templates
    to: one_to_two_V2/src/pipeline/templates

asarUnpack:
  - one_to_two_V2/**/*

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: ${productName}-${version}-Setup-${arch}.exe

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ${productName}
  deleteAppDataOnUninstall: false
  runAfterFinish: true
  language: "2052"
  perMachine: false

compression: maximum
