appId: com.onetotwo.app
productName: OneToTwo
copyright: Copyright © 2024 OneToTwo Team

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - node_modules/**/*
  - package.json

extraResources:
  - from: python-api
    to: python-api
    filter:
      - "**/*.py"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
      - "!**/.git/**"
  - from: one_to_two_V2
    to: one_to_two_V2
    filter:
      - "**/*.py"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
      - "!**/.git/**"
      - "!**/cache/**"
      - "!**/models/**"
      - "!**/snapshots/**"
      - "!**/venv/**"
      - "!**/data/**"
      - "!**/logs/**"
      - "!**/reports/**"
      - "**/config/**"
      - "**/pipeline/templates/**"

asarUnpack:
  - python-api/**/*
  - one_to_two_V2/**/*

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: ${productName}-${version}-Setup-${arch}.exe

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ${productName}
  deleteAppDataOnUninstall: false
  runAfterFinish: true
  language: "2052"
  perMachine: false

compression: maximum
