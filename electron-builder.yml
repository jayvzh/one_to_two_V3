appId: com.onetotwo.app
productName: OneToTwo Assistant
copyright: Copyright © 2025 MUE Studio

win:
  executableName: OneToTwo
  artifactName: OneToTwo-Setup v${version}.${ext}

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - node_modules/**/*
  - package.json

extraResources:
  - from: dist/onetotwo-api.exe
    to: onetotwo-api.exe

extraFiles:
  - from: python-api/pipeline_defaults.json
    to: pipeline_defaults.json
  - from: python-api/pipeline/templates
    to: pipeline/templates
  - from: python-api/datasets
    to: datasets

asarUnpack:
  - pipeline/**/*
